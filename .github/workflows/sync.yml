name: Sync Fork

on:
  schedule:
    - cron: '0 * * * *'  # 每小时同步一次
  workflow_dispatch:  # 按钮手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/gekichumai/dxrating.git
          git fetch upstream
          git checkout main  # 如果是 master 则改为 master
          git merge upstream/main --allow-unrelated-histories
          git push origin main